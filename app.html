<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="送貨單掃描">
<meta name="theme-color" content="#1a3a2a">
<title>混凝土送貨單掃描</title>

<!-- Google Apps Script Web App URL - 請替換成你的 -->
<script>
const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzP3Tvh6OjxB2TW4Acu9dw2aHN93334GBdUXPVEc536BCzRz9TowoJVTDEoRij65blV/exec';
// ↑↑↑ 部署 Google Apps Script 後，請貼上 Web App URL ↑↑↑
</script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --green-dark: #1a3a2a;
    --green-mid: #2d6a4f;
    --green-light: #52b788;
    --green-pale: #d8f3dc;
    --amber: #e76f51;
    --amber-dark: #c1440e;
    --text-main: #1b1b1b;
    --text-muted: #5f6b62;
    --surface: #f4f9f5;
    --white: #ffffff;
    --border: #cce0d0;
    --radius: 16px;
    --radius-sm: 10px;
  }

  html, body {
    height: 100%;
    background: var(--surface);
    font-family: -apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    color: var(--text-main);
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    background: var(--green-dark);
    color: #fff;
    padding: 52px 20px 20px;
    text-align: center;
    position: relative;
  }
  .header h1 { font-size: 17px; font-weight: 600; letter-spacing: 0.5px; }
  .header p  { font-size: 13px; opacity: 0.65; margin-top: 4px; }

  /* ── SCREENS ── */
  .screen { display: none; animation: fadeIn 0.25s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ── CAPTURE SCREEN ── */
  .capture-body {
    padding: 32px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  .camera-zone {
    width: 100%;
    max-width: 360px;
    aspect-ratio: 3/4;
    background: var(--green-dark);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    border: 2px solid var(--green-light);
  }
  .camera-zone video,
  .camera-zone canvas {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .camera-zone canvas { position: absolute; top: 0; left: 0; }

  /* corner guide */
  .camera-zone::before, .camera-zone::after {
    content: '';
    position: absolute;
    width: 40px; height: 40px;
    z-index: 3;
  }
  .camera-zone::before { top: 12px; left: 12px; border-top: 3px solid var(--green-light); border-left: 3px solid var(--green-light); border-radius: 6px 0 0 0; }
  .camera-zone::after  { bottom: 12px; right: 12px; border-bottom: 3px solid var(--green-light); border-right: 3px solid var(--green-light); border-radius: 0 0 6px 0; }

  #video { display: block; }
  #preview { display: none; }
  .preview-mode #video { display: none; }
  .preview-mode #preview { display: block; }

  .placeholder-msg {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.45);
    font-size: 14px; gap: 8px;
    z-index: 2;
    pointer-events: none;
  }
  .placeholder-msg svg { width: 48px; height: 48px; opacity: 0.4; }

  .btn-capture {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: var(--green-light);
    border: 4px solid var(--white);
    box-shadow: 0 0 0 3px var(--green-light);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.12s;
  }
  .btn-capture:active { transform: scale(0.94); }
  .btn-capture svg { width: 28px; height: 28px; fill: var(--white); }

  .btn-upload {
    font-size: 14px;
    color: var(--green-mid);
    background: none;
    border: 1.5px solid var(--border);
    padding: 10px 22px;
    border-radius: 50px;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-upload:active { background: var(--green-pale); }

  #fileInput { display: none; }

  /* ── ANALYZING SCREEN ── */
  .analyzing-body {
    padding: 60px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }
  .spinner {
    width: 52px; height: 52px;
    border: 4px solid var(--green-pale);
    border-top: 4px solid var(--green-light);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .analyzing-body h2 { font-size: 17px; color: var(--green-dark); }
  .analyzing-body p  { font-size: 13px; color: var(--text-muted); text-align: center; }

  /* ── RESULT SCREEN ── */
  .result-body { padding: 20px; }

  .result-card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 16px;
  }
  .result-card-header {
    background: var(--green-dark);
    color: #fff;
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }
  .result-card-header svg { width: 16px; height: 16px; fill: rgba(255,255,255,0.7); }

  .field-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--green-pale);
  }
  .field-row:last-child { border-bottom: none; }
  .field-label { font-size: 13px; color: var(--text-muted); }
  .field-value {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-main);
    text-align: right;
  }
  .field-value.highlight { color: var(--green-mid); font-size: 18px; }

  .editable-value {
    font-size: 15px; font-weight: 600;
    color: var(--text-main);
    border: none; background: none;
    text-align: right; padding: 0;
    width: 140px;
    border-bottom: 1.5px dashed var(--green-light);
  }
  .editable-value:focus { outline: none; border-bottom-color: var(--green-mid); }

  .btn-confirm {
    width: 100%;
    padding: 16px;
    background: var(--green-mid);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background 0.15s, transform 0.1s;
    margin-bottom: 12px;
  }
  .btn-confirm:active { transform: scale(0.98); background: var(--green-dark); }

  .btn-retake {
    width: 100%;
    padding: 12px;
    background: none;
    color: var(--text-muted);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    cursor: pointer;
    margin-bottom: 24px;
  }
  .btn-retake:active { background: var(--green-pale); }

  /* ── SUCCESS SCREEN ── */
  .success-body {
    padding: 60px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    text-align: center;
  }
  .checkmark {
    width: 72px; height: 72px;
    background: var(--green-pale);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    animation: popIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
  .checkmark svg { width: 36px; height: 36px; stroke: var(--green-mid); stroke-width: 2.5; fill: none; }
  .success-body h2 { font-size: 20px; font-weight: 700; color: var(--green-dark); }
  .success-body p  { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
  .success-time { font-size: 12px; color: var(--text-muted); background: var(--green-pale); padding: 6px 14px; border-radius: 50px; }

  .btn-again {
    margin-top: 12px;
    padding: 14px 40px;
    background: var(--green-dark);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 15px; font-weight: 600;
    cursor: pointer;
  }
  .btn-again:active { opacity: 0.85; }

  /* ── ERROR BANNER ── */
  .error-banner {
    background: #fff0ec;
    border: 1px solid #f5c4b3;
    color: var(--amber-dark);
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    margin: 0 20px 12px;
    display: none;
    line-height: 1.5;
  }
  .error-banner.show { display: block; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: var(--green-dark);
    color: #fff; padding: 10px 20px;
    border-radius: 50px; font-size: 14px;
    opacity: 0; transition: opacity 0.25s;
    pointer-events: none; white-space: nowrap;
    z-index: 999;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <h1>混凝土送貨單掃描</h1>
  <p>台灣水泥・高雄廠現場記錄</p>
</div>

<!-- SCREEN 1: Capture -->
<div id="screen-capture" class="screen active">
  <div class="capture-body">
    <div class="camera-zone" id="cameraZone">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="preview"></canvas>
      <div class="placeholder-msg" id="placeholderMsg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <span>點下方按鈕拍照</span>
      </div>
    </div>

    <button class="btn-capture" id="btnCapture" onclick="capturePhoto()">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
    </button>

    <button class="btn-upload" onclick="document.getElementById('fileInput').click()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      從相簿上傳
    </button>
    <input type="file" id="fileInput" accept="image/*" onchange="handleFileUpload(event)">
  </div>
</div>

<!-- SCREEN 2: Analyzing -->
<div id="screen-analyzing" class="screen">
  <div class="analyzing-body">
    <div class="spinner"></div>
    <h2>正在辨識送貨單…</h2>
    <p>AI 分析中，請稍候</p>
  </div>
</div>

<!-- SCREEN 3: Result -->
<div id="screen-result" class="screen">
  <div class="result-body">
    <div class="error-banner" id="errorBanner"></div>

    <div class="result-card">
      <div class="result-card-header">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        送貨資訊
      </div>
      <div class="field-row">
        <span class="field-label">分廠</span>
        <span class="field-value" id="r-factory">—</span>
      </div>
      <div class="field-row">
        <span class="field-label">出廠時間</span>
        <span class="field-value" id="r-time">—</span>
      </div>
      <div class="field-row">
        <span class="field-label">車號</span>
        <span class="field-value" id="r-plate">—</span>
      </div>
      <div class="field-row">
        <span class="field-label">交貨數量</span>
        <span class="field-value highlight" id="r-qty">—</span>
      </div>
      <div class="field-row">
        <span class="field-label">車次</span>
        <span class="field-value" id="r-trip">—</span>
      </div>
      <div class="field-row">
        <span class="field-label">交貨累計</span>
        <span class="field-value" id="r-total">—</span>
      </div>
    </div>

    <div class="result-card">
      <div class="result-card-header">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        現場備註（選填）
      </div>
      <div class="field-row">
        <span class="field-label">備註</span>
        <input class="editable-value" id="r-note" type="text" placeholder="可輸入備註" maxlength="80">
      </div>
    </div>

    <button class="btn-confirm" onclick="submitData()">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" width="18" height="18">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      確認送出
    </button>
    <button class="btn-retake" onclick="retake()">重新拍照</button>
  </div>
</div>

<!-- SCREEN 4: Success -->
<div id="screen-success" class="screen">
  <div class="success-body">
    <div class="checkmark">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h2>資料已送出！</h2>
    <p>資料已成功寫入<br>Google Sheets 試算表</p>
    <div class="success-time" id="successTime"></div>
    <button class="btn-again" onclick="resetApp()">繼續掃描下一張</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──
let capturedImageBase64 = null;
let parsedData = {};

// ── Camera ──
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 2560 } }
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    document.getElementById('placeholderMsg').style.display = 'none';
  } catch(e) {
    // Camera not available — show upload only
    document.getElementById('btnCapture').style.display = 'none';
  }
}

function capturePhoto() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('preview');
  if (!video.srcObject) { showToast('請先允許相機權限'); return; }
  canvas.width  = video.videoWidth  || 1080;
  canvas.height = video.videoHeight || 1440;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);
  document.getElementById('cameraZone').classList.add('preview-mode');
  capturedImageBase64 = canvas.toDataURL('image/jpeg', 0.92).split(',')[1];
  analyzeImage();
}

function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.getElementById('preview');
      canvas.width = img.width; canvas.height = img.height;
      canvas.getContext('2d').drawImage(img, 0, 0);
      document.getElementById('cameraZone').classList.add('preview-mode');
      document.getElementById('placeholderMsg').style.display = 'none';
      capturedImageBase64 = e.target.result.split(',')[1];
      analyzeImage();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

// ── AI Analysis ──
const GEMINI_API_KEY = 'AIzaSyAQ.Ab8RN6JPD71BfYfKP6bzGzVuuDWxlhoYKqTx2m3O_SR1UAsGhg';

async function analyzeImage() {
  showScreen('screen-analyzing');
  const prompt = `這是一張台灣水泥預拌混凝土送貨單的照片。
請仔細辨識並以純 JSON 格式回覆以下欄位（不要加任何其他文字）：
{"factory":"分廠名稱","departureTime":"出廠時間HH:MM:SS","licensePlate":"車號","deliveryQty":"交貨數量純數字","tripNumber":"車次數字","cumulativeQty":"交貨累計純數字"}
若無法辨識填空字串。只輸出JSON不加markdown。`;

  try {
    const response = await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=AQ.Ab8RN6JPD71BfYfKP6bzGzVuuDWxlhoYKqTx2m3O_SR1UAsGhg',
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [
            { inline_data: { mime_type: 'image/jpeg', data: capturedImageBase64 } },
            { text: prompt }
          ]}]
        })
      }
    );
    const result = await response.json();
    if (result.error) throw new Error(result.error.message);
    const text = result.candidates[0].content.parts[0].text.trim();
    const clean = text.replace(/```json|```/g, '').trim();
    parsedData = JSON.parse(clean);
    showResult();
  } catch(e) {
    showScreen('screen-result');
    showError('辨識失敗，請手動填寫欄位或重新拍照。\n錯誤：' + e.message);
    parsedData = {};
    showResult(true);
  }
}

function showResult(error = false) {
  showScreen('screen-result');
  document.getElementById('r-factory').textContent = parsedData.factory || '—';
  document.getElementById('r-time').textContent    = parsedData.departureTime || '—';
  document.getElementById('r-plate').textContent   = parsedData.licensePlate || '—';
  document.getElementById('r-qty').textContent     = parsedData.deliveryQty || '—';
  document.getElementById('r-trip').textContent    = parsedData.tripNumber || '—';
  document.getElementById('r-total').textContent   = parsedData.cumulativeQty || '—';
  document.getElementById('r-note').value = '';
}

// ── Submit to Google Sheets ──
async function submitData() {
  const btn = document.querySelector('.btn-confirm');
  btn.disabled = true;
  btn.textContent = '送出中…';

  const payload = {
    timestamp: new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' }),
    factory: document.getElementById('r-factory').textContent,
    departureTime: document.getElementById('r-time').textContent,
    licensePlate: document.getElementById('r-plate').textContent,
    deliveryQty: document.getElementById('r-qty').textContent,
    tripNumber: document.getElementById('r-trip').textContent,
    cumulativeQty: document.getElementById('r-total').textContent,
    note: document.getElementById('r-note').value
  };

  if (GOOGLE_SCRIPT_URL === 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {
    // Demo mode
    await new Promise(r => setTimeout(r, 1000));
    showSuccess(payload.timestamp);
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" width="18" height="18"><polyline points="20 6 9 17 4 12"/></svg> 確認送出';
    return;
  }

  try {
    await fetch(GOOGLE_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ mode: 'save', ...payload })
    });
    showSuccess(payload.timestamp);
  } catch(e) {
    showError('送出失敗，請檢查網路連線。錯誤：' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" width="18" height="18"><polyline points="20 6 9 17 4 12"/></svg> 確認送出';
  }
}

function showSuccess(time) {
  showScreen('screen-success');
  document.getElementById('successTime').textContent = '送出時間：' + time;
}

// ── Helpers ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showError(msg) {
  const el = document.getElementById('errorBanner');
  el.textContent = msg;
  el.classList.add('show');
}

function retake() {
  document.getElementById('errorBanner').classList.remove('show');
  document.getElementById('cameraZone').classList.remove('preview-mode');
  capturedImageBase64 = null;
  parsedData = {};
  showScreen('screen-capture');
}

function resetApp() {
  retake();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Init ──
startCamera();
</script>
</body>
</html>
